name: Manual Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - pre
          - patch
          - minor
          - major
          - preminor
          - premajor
      prerelease:
        description: >-
          Controls how the CHANGELOG is updated (does NOT affect the version number).
          Checked = stamp: moves Unreleased entries into their own version section. Normal for pre-releases (e.g. bump=pre + checked).
          Unchecked = consolidate: merges all pre-release entries into one section. Normal for stable releases (e.g. bump=patch + unchecked merges alpha.1-8 into 0.1.0).
        required: true
        type: boolean
        default: true

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(scripts/bump-version.sh "${{ inputs.bump }}" \
            --file lib/signwell_sdk/version.rb \
            --pattern "VERSION\s*=\s*'([^']+)'" \
            --replace "s/VERSION = '.*'/VERSION = '%s'/")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Update changelog
        run: |
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            ruby scripts/update-changelog.rb stamp "${{ steps.bump.outputs.version }}"
          else
            ruby scripts/update-changelog.rb consolidate "${{ steps.bump.outputs.version }}"
          fi

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="release/v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add lib/signwell_sdk/version.rb CHANGELOG.md
          git commit -m "chore: release $VERSION"
          git push -u origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release $VERSION" \
            --body "$(cat <<EOF
          ## Release v$VERSION

          - Bump type: \`${{ inputs.bump }}\`
          - Pre-release: \`${{ inputs.prerelease }}\`
          - Updates \`lib/signwell_sdk/version.rb\` to \`$VERSION\`
          - Updates \`CHANGELOG.md\`

          **Review the CHANGELOG.md changes before merging.** Edit on this branch if needed.

          Merging this PR will automatically publish to RubyGems and create a GitHub Release.
          EOF
          )"
