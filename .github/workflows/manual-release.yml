name: Manual Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - pre
          - patch
          - minor
          - major
          - preminor
          - premajor

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(scripts/bump-version.sh "${{ inputs.bump }}" \
            --file lib/signwell_sdk/version.rb \
            --pattern "VERSION\s*=\s*'([^']+)'" \
            --replace "s/VERSION = '.*'/VERSION = '%s'/")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="release/v$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add lib/signwell_sdk/version.rb
          git commit -m "chore: release $VERSION"
          git push -u --force origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release $VERSION" \
            --body "$(cat <<EOF
          ## Release v$VERSION

          - Bump type: \`${{ inputs.bump }}\`
          - Updates \`lib/signwell_sdk/version.rb\` to \`$VERSION\`

          Merging this PR will automatically publish to RubyGems and create a GitHub Release.
          EOF
          )"
