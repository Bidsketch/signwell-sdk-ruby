name: Bug Report
description: Report a bug in the SignWell Ruby SDK
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: |
        When I call `SignWell::Resources::Document.create(...)`, I get a NoMethodError...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code example or steps to reproduce the issue.
      placeholder: |
        ```ruby
        client = SignWell::Client.new(api_key: "...")
        client.documents.create(name: "Test", ...)
        ```
    validations:
      required: true

  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      description: "Output of: `Gem.loaded_specs['signwell_sdk'].version`"
      placeholder: "0.1.0.pre.alpha.10"
    validations:
      required: true

  - type: input
    id: ruby-version
    attributes:
      label: Ruby version
      description: "Output of: `ruby -v`"
      placeholder: "ruby 3.3.0"
    validations:
      required: true

  - type: textarea
    id: stacktrace
    attributes:
      label: Error output / stacktrace
      description: Paste any error messages or stack traces.
      render: text
    validations:
      required: false
