name: Feature Request
description: Suggest an improvement or new feature for the SDK
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: If you have ideas on how this could work, describe them here.
    validations:
      required: false

  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: "0.1.0.pre.alpha.10"
    validations:
      required: false
