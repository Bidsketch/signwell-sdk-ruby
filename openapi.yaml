components:
  securitySchemes:
    api_key:
      type: apiKey
      name: X-Api-Key
      in: header
  schemas:
    FieldType:
      type: string
      enum:
      - initials
      - signature
      - checkbox
      - date
      - select
      - text
      - dropdown
      - autofill_company
      - autofill_email
      - autofill_first_name
      - autofill_last_name
      - autofill_name
      - autofill_phone
      - autofill_title
      - autofill_date_signed
      description: Type of signing field
    TextValidation:
      type: string
      enum:
      - no_text_validation
      - numbers
      - letters
      - email_address
      - us_phone_number
      - us_zip_code
      - us_ssn
      - us_age
      - alphanumeric
      - us_bank_routing_number
      - us_bank_account_number
      description: Validation rule for text fields
    DateFormat:
      type: string
      enum:
      - MM/DD/YYYY
      - DD/MM/YYYY
      - YYYY/MM/DD
      - Month DD, YYYY
      - MM/DD/YYYY hh:mm:ss a
      description: 'Date format for date fields. Valid values: MM/DD/YYYY, DD/MM/YYYY,
        YYYY/MM/DD, Month DD, YYYY, MM/DD/YYYY hh:mm:ss a. Default: MM/DD/YYYY'
    CheckboxValidation:
      type: string
      enum:
      - minimum
      - maximum
      - range
      - exact
      description: Validation rule for checkbox groups
    FileInfo:
      type: object
      description: File information
      properties:
        name:
          type: string
          description: File name
        pages_number:
          type: integer
          description: Number of pages in the file
      required:
      - name
      - pages_number
    LabelInfo:
      type: object
      description: Label information
      properties:
        id:
          type: string
          description: Label ID
        name:
          type: string
          description: Label name
    CopiedContactInfo:
      type: object
      description: Copied contact information
      properties:
        id:
          type: string
          description: Contact ID
        name:
          type: string
          description: Contact name
        email:
          type: string
          format: email
          description: Contact email
      required:
      - email
    CheckboxGroupInfo:
      type: object
      description: Checkbox group configuration
      properties:
        id:
          type: string
          format: uuid
          description: Checkbox group ID
        group_name:
          type: string
          nullable: true
          description: Name of the checkbox group
        recipient_id:
          type: string
          nullable: true
          description: Recipient ID associated with the group
        checkbox_ids:
          type: array
          items:
            type: string
          description: IDs of checkboxes in this group
        validation:
          "$ref": "#/components/schemas/CheckboxValidation"
          nullable: true
        required:
          type: boolean
          description: Whether at least one checkbox must be checked
        min_value:
          type: integer
          description: Minimum number of checkboxes to check
        max_value:
          type: integer
          description: Maximum number of checkboxes to check
        exact_value:
          type: integer
          description: Exact number of checkboxes that must be checked
      required:
      - id
      - checkbox_ids
      - required
    AttachmentRequestInfo:
      type: object
      description: Attachment request information
      properties:
        name:
          type: string
          description: Name of the attachment request
        url:
          type: string
          format: url
          description: URL of the uploaded attachment (when available)
        required:
          type: boolean
          description: Whether the attachment is required
      required:
      - name
      - required
    AdditionalFields:
      type: array
      description: Fields to be added to any appended files (not existing files).
        Document fields placed on a document for collecting data or signatures from
        recipients. Field data should be sent as a 2-dimensional JSON array. One array
        of fields is needed for each file in the files array. An array of fields can
        be empty if you have a file that does not contain any fields.
      items:
        type: array
        description: Array of Fields you're adding to each file.
        items:
          type: object
          properties:
            x:
              type: number
              format: float
              description: Horizontal value in the coordinates of the field (in pixels).
                Coordinates are specific to the page where fields are located.
            "y":
              type: number
              format: float
              description: Vertical value in the coordinates of the field (in pixels).
                Coordinates are specific to the page where fields are located.
            page:
              type: integer
              description: The page number within the file. If the page does not exist
                within the file then the field won't be created.
            recipient_id:
              type: string
              description: Unique identifier of the recipient assigned to the field.
                Recipients assigned to fields will be the only ones that will see
                and be able to complete those fields.
            type:
              "$ref": "#/components/schemas/FieldType"
              description: 'Field type of the field. Valid field types: initials,
                signatures, checkbox, date, and text. To autofill fields with contact
                data, use an autofill field type. To group checkbox fields, enter
                an api_id for each checkbox and add the checkbox_groups parameter.'
            required:
              type: boolean
              default: true
              description: Whether the field must be completed by the recipient. Defaults
                to `true` except for checkbox type fields.
            label:
              type: string
              description: 'Text and Date fields only: label that is displayed when
                the field is empty.'
            value:
              oneOf:
              - type: string
              - type: boolean
              - type: number
              description: Varies according to the field type. Text fields accept
                strings or numbers. Date fields accept Iso8601 date strings. CheckBoxes
                accept booleans. Signature and Initials fields can't be signed through
                API requests. Autofill text fields accept strings or numbers.
            api_id:
              type: string
              description: Unique identifier of the field. Useful when needing to
                reference specific field values or update a document and its fields.
            name:
              type: string
              description: Checkbox fields only. At least 2 checkbox fields in an
                array of fields must be assigned to the same recipient and grouped
                with selection requirements.
            validation:
              "$ref": "#/components/schemas/TextValidation"
              description: 'Text fields only: optional validation for field values.
                Valid values: numbers, letters, email_address, us_phone_number, us_zip_code,
                us_ssn, us_age, alphanumeric, us_bank_routing_number, us_bank_account.'
            fixed_width:
              type: boolean
              default: false
              description: 'Text fields only: whether the field width will stay fixed
                and text will display in multiple lines, rather than one long line.
                If set to `false` the field width will automatically grow horizontally
                to fit text on one line. Defaults to `false`.'
            lock_sign_date:
              type: boolean
              default: false
              description: 'Date fields only: makes fields readonly and automatically
                populates with the date the recipient signed. Defaults to `false`.'
            date_format:
              "$ref": "#/components/schemas/DateFormat"
              description: 'Date fields only: date format to use for the field. Valid
                values: MM/DD/YYYY, DD/MM/YYYY, YYYY/MM/DD, Month DD, YYYY, and MM/DD/YYYY
                hh:mm:ss a. Defaults to MM/DD/YYYY.'
            formula:
              type: string
              description: 'Date fields only (text field formulas coming soon): formulas
                are a way to prefill fields with calculated future or past dates.
                Addition, subtraction, and parentheses are allowed. Valid event dates
                are `created_date`, `sent_date`, and `signed_date`. Valid time periods
                are `day`, `days`, `week`, `weeks`, `month`, and `months`. Example:
                `formula: ''sent_date + 10 days''`. Use with `lock_sign_date` if you''d
                like to make the field readonly and prevent signers from choosing
                a different date.'
            height:
              type: number
              format: float
              description: 'Height of the field (in pixels). Maximum height varies
                by field type: Signature/Initials (200px), others (74px). When using
                text tags if the height is greater than the maximum height, the height
                will be set to the maximum height.'
            width:
              type: number
              format: float
              description: Width of the field (in pixels). For text fields, width
                will auto-grow unless `fixed_width` is true.
            options:
              type: array
              description: Array of dropdown options (for dropdown/select fields only)
              items:
                "$ref": "#/components/schemas/DropdownOption"
            default_option:
              type: string
              description: Default selected option (for dropdown/select fields only)
            allow_other:
              type: boolean
              description: Whether to allow "Other" option with text input (for dropdown/select
                fields only)
              default: false
          required:
          - x
          - "y"
          - page
          - recipient_id
          - type
    AdditionalFiles:
      type: array
      items:
        type: object
        description: 'Additional files to be appended to the document. Will not replace
          existing files from the template. Document files can be uploaded by specifying
          a file URL or base64 string. Either `file_url` or `file_base64` must be
          present (not both). Valid file types are: .pdf, .docx, .jpg, .png, .ppt,
          .xls, .pages, and .txt.'
        properties:
          name:
            type: string
            description: Name of the file that will be uploaded.
          file_url:
            type: string
            format: url
            description: Publicly available URL of the file to be uploaded.
          file_base64:
            type: string
            format: byte
            description: A RFC 4648 base64 string of the file to be uploaded.
        required:
        - name
    ApiApplicationId:
      type: string
      format: uuid
      description: Unique identifier for API Application settings to use. API Applications
        are optional and mainly used when isolating OAuth apps or for more control
        over embedded API settings
    TemplateAttachmentRequests:
      type: array
      description: Attachments that a recipient must upload to complete the signing
        process. Attachment requests are shown after all document fields have been
        completed.
      items:
        type: object
        properties:
          name:
            type: string
            description: Name of the requested attachment.
          placeholder_id:
            type: string
            description: Unique identifier of the recipient that will view the attachment
              request.
          required:
            type: boolean
            default: true
            description: Whether the recipient will need to upload the attachment
              to successfully complete/sign the document. Defaults to `true`.
        required:
        - name
        - placeholder_id
    AttachmentRequests:
      type: array
      description: Attachments that a recipient must upload to complete the signing
        process. Attachment requests are shown after all document fields have been
        completed.
      items:
        type: object
        properties:
          name:
            type: string
            description: Name of the requested attachment.
          recipient_id:
            type: string
            description: Unique identifier of the recipient that will view the attachment
              request.
          required:
            type: boolean
            default: true
            description: Whether the recipient will need to upload the attachment
              to successfully complete/sign the document. Defaults to `true`.
        required:
        - name
        - recipient_id
    TemplateCheckboxGroups:
      type: array
      description: Checkbox fields that are placed on a document can be grouped with
        selection requirements. At least 2 checkbox fields in an array of fields must
        be assigned to the same recipient.
      items:
        type: object
        properties:
          group_name:
