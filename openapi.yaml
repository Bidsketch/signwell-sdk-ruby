    Files:
      type: array
      description: 'Document files can be uploaded by specifying a file URL or base64
        string. Either `file_url` or `file_base64` must be present (not both). Valid
        file types are: .pdf, .doc, .docx, .pages, .ppt, .pptx, .key, .xls, .xlsx,
        .numbers, .jpg, .jpeg, .png, .tiff, .tif, .webp, .html, and .htm'
      items:
        type: object
        properties:
          name:
            type: string
            description: Name of the file that will be uploaded.
          file_url:
            type: string
            format: url
            description: Publicly available URL of the file to be uploaded.
          file_base64:
            type: string
            format: byte
            description: A RFC 4648 base64 string of the file to be uploaded.
        required:
        - name
    Limit:
      type: integer
      minimum: 1
      maximum: 50
      default: 10
      description: The number of documents to fetch. Defaults to 10, max is 50.
    Page:
      type: integer
      minimum: 1
      default: 1
      description: The page number for pagination. Defaults to the first page.
    Placeholders:
      type: array
      description: Placeholders are generally job roles that must complete and/or
        sign the document. For example, a placeholder might be “Client” or “Legal
        Department”. When a document is created from the template, you assign a person
        to each placeholder.
      items:
        type: object
        properties:
          id:
            type: string
            description: A unique identifier that you will give to each placeholder.
              We recommend numbering sequentially from 1 to X. IDs are required for
              associating recipients to fields and more.
          name:
            type: string
            description: Name of the placeholder.
          preassigned_recipient_name:
            type: string
            description: In some cases, it may be necessary to pre-fill the name and
              email for a placeholder because it will always be the same person for
              all documents created from this template. This sets the name.
          preassigned_recipient_email:
            type: string
            format: email
            description: In some cases, it may be necessary to pre-fill the name and
              email for a placeholder because it will always be the same person for
              all documents created from this template. This sets the email.
        required:
        - id
        - name
    ReminderRecipients:
      type: array
      description: Optional list if recipients within the document to send a reminder
        email to. If none are specified, all recipients that have not signed yet will
        receive a reminder email.
      items:
        type: object
        properties:
          name:
            type: string
            description: Recipient's name (required if multiple recipients share the
              same email).
          email:
            type: string
            format: email
            description: Recipient's email address.
    update_recipients_map:
      type: array
      description: List of recipients to update on the document.
      items:
        type: object
        required:
        - id
        - name
        - email
        properties:
          id:
            type: string
            description: The recipient's unique identifier from the Get Document response.
          name:
            type: string
            description: Updated name for the recipient.
          email:
            type: string
            format: email
            example: jane@example.com
            description: Updated email address for the recipient.
          subject:
            type: string
            description: Updated email subject for the signature request that this
              recipient will see.
          message:
            type: string
            description: Updated email message for the signature request that this
              recipient will see.
          passcode:
            type: string
            description: Updated passcode for the recipient. If set, the signer will
              be required to enter the passcode before viewing and completing the
              document.
    TemplateFieldValues:
      type: array
      description: Fields of your template(s) that you can prepopulate with values.
        Signature and Initials fields cannot be signed through the API.
      items:
        type: object
        properties:
          api_id:
            type: string
            description: The API ID of the field in your template. This field is case
              sensitive.
          value:
            oneOf:
            - type: string
            - type: boolean
            - type: number
            description: TextField value must be a string or a number.
        required:
        - api_id
        - value
    TemplateId:
      type: string
      format: uuid
      description: Unique identifier for a template.
    TemplateIds:
      type: array
      items:
        type: string
        format: uuid
      description: Unique identifiers for a list of templates.
    TemplateRecipients:
      type: array
      description: Document recipients are people that must complete and/or sign a
        document. Recipients of the document must be assigned to a placeholder of
        the template. Recipients will inherit all placeholder fields and settings.
      items:
        type: object
        properties:
          id:
            type: string
            description: A unique identifier that you will give to each recipient.
              We recommend numbering sequentially from 1 to X. IDs are required for
              associating recipients to fields and more.
          name:
            type: string
            description: Name of the recipient.
          email:
            type: string
            format: email
            description: Email address for the recipient.
            example: signer@example.com
          placeholder_name:
            type: string
            description: The name of the placeholder you want this recipient assigned
              to.
          passcode:
            type: string
            description: If set, signers assigned with a passcode will be required
              to enter the passcode before they’re able to view and complete the document.
          subject:
            type: string
            description: Email subject for the signature request that the recipient
              will see. Overrides the general subject for the template.
          message:
            type: string
            description: Email message for the signature request that the recipient
              will see. Overrides the general message for the template.
          send_email:
            type: boolean
            default: false
            description: Applies on when `embedded_signing` is `true`. By default,
              recipients are not notified through email to sign when doing embedded
              signing. Setting this to `true`  will send a notification email to the
              recipient. Default is `false`.
          send_email_delay:
            type: integer
            default: 0
            description: If `send_email` is `true` recipients will receive a new document
              notification immediately. In the case of embedded signing, you can delay
              this notification to only send if the document is not completed within
              a few minutes. The email notification will not go out if the document
              is completed before the delay time is over. Valid values are in minutes
              ranging from `0` to `60`. Defaults to `0`.
        required:
        - id
        - email
    UrlOnly:
      type: boolean
      default: false
      description: Whether to return the URL of the completed PDF or the actual PDF
        content. Defaults to `false`.
    ObjectOnly:
      type: boolean
      default: false
      description: If true, returns raw NOM-151 constancia certificate object as JSON
        instead of a zip file or URL.
    IncludeAuditPage:
      type: boolean
      default: true
      description: Whether to include the audit page as part of the document. Defaults
        to `true`
    FileFormat:
      type: string
      enum:
      - pdf
      - zip
      description: Format of the file to be downloaded. Supported formats are 'pdf'
        and 'zip'.
    UserEmail:
      type: string
      format: email
      description: The email address of the user that sent the Bulk Send. Must have
        the `admin` or `manager` role to view Bulk Sends of other users. Defaults
        to the user that the API key belongs to.
    Labels:
      type: array
      description: Labels can be used to organize documents in a way that can make
        it easy to find using the document search in SignWell. A document can have
        multiple labels.
      items:
        "$ref": "#/components/schemas/LabelRequest"
    LabelsUpdate:
      type: array
      description: Labels can be used to organize documents in a way that can make
        it easy to find using the document search in SignWell. A document can have
        multiple labels. Updating labels on a document will replace any existing labels
        for that document.
      items:
        "$ref": "#/components/schemas/LabelRequest"
    LabelsResponse:
      type: array
      description: Labels can be used to organize documents in a way that can make
        it easy to find using the document search in SignWell. A document can have
        multiple labels. Updating labels on a document will replace any existing labels
        for that document.
      items:
        "$ref": "#/components/schemas/LabelResponse"
    LabelResponse:
      type: object
      description: Labels can be used to organize documents and templates in a way
        that can make it easy to find using the document search/template search in
        SignWell. Labels can be used to organize documents in a way that can make
        it easy to find using the document search in SignWell.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
      required:
      - name
    LabelRequest:
      type: object
      description: Labels can be used to organize documents and templates in a way
        that can make it easy to find using the document search/template search in
        SignWell. Labels can be used to organize documents in a way that can make
        it easy to find using the document search in SignWell.
      properties:
        name:
          type: string
      required:
      - name
    DropdownOption:
      oneOf:
      - type: string
        title: SimpleOption
        description: Simple string option
      - type: object
        title: DetailedOption
        description: Detailed option object
        properties:
          name:
            type: string
            description: Option display name
          api_id:
            type: string
            description: Unique identifier for the option
          is_other:
            type: boolean
            description: Whether this is the special "Other" option
            default: false
        required:
        - name
      description: A dropdown option - either a simple string or a detailed object
        with name and optional api_id
    CreateBulkSendRequest:
      type: object
      properties:
        template_ids:
          type: array
          items:
            type: string
            format: uuid
            example: 00000000-0000-0000-0000-000000000000
          description: Unique identifiers for a list of templates.
        bulk_send_csv:
          type: string
          description: A RFC 4648 base64 string of the template CSV file to be validated.
          example: bmFtZSxlbWFpbApUZXN0LHRlc3RAZXhhbXBsZS5jb20K
        skip_row_errors:
          type: boolean
          default: false
          description: Whether to skip errors in the rows. Defaults to `false`.
        api_application_id:
          type: string
          format: uuid
          description: Unique identifier for API Application settings to use. API
            Applications are optional and mainly used when isolating OAuth apps or
            for more control over embedded API settings
        name:
          type: string
          description: The name of the Bulk Send. Will be used as the document name
            for each of the documents.
        subject:
          type: string
          description: Email subject for the signature request that recipients will
            see. Defaults to the default system subject or a template subject.
        message:
          type: string
          description: Email message for the signature request that recipients will
            see. Defaults to the default system message or a template message.
        apply_signing_order:
          type: boolean
          default: false
          description: When set to `true` recipients will sign one at a time in the
            order of the `recipients` collection of this request.
        custom_requester_name:
          type: string
          description: Sets the custom requester name for the document. When set,
            this is the name used for all email communications, signing notifications,
            and in the audit file.
        custom_requester_email:
          type: string
          format: email
          description: Sets the custom requester email for the document. When set,
            this is the email used for all email communications, signing notifications,
            and in the audit file.
      required:
      - template_ids
      - bulk_send_csv
    BulkSendCsvRequest:
      type: object
      properties:
        template_ids:
          type: array
          description: Specify one or more templates to generate a single blank CSV
            file that will contain available columns for your recipient data. The
            template_ids[] parameter is an array of template IDs (e.g.,`/?template_ids[]=5a67dbd7-928a-4ea0-a7e2-e476a0eb045f&template_ids[]=d7315111-c671-4b15-8354-c9a19bbaefa0`).
            Each ID should be a separate parameter in the query string.
          items:
            type: string
            format: uuid
            example: 00000000-0000-0000-0000-000000000000
        bulk_send_csv:
          type: string
          description: A RFC 4648 base64 string of the template CSV file to be validated.
          example: bmFtZSxlbWFpbApUZXN0LHRlc3RAZXhhbXBsZS5jb20K
      required:
      - template_ids
      - bulk_send_csv
    DocumentRequest:
      type: object
      properties:
        test_mode:
          type: boolean
          default: false
          description: Set to `true` to enable Test Mode. Documents created with Test
            Mode do not count towards API billing and are not legally binding. Defaults
            to `false`
        files:
          "$ref": "#/components/schemas/Files"
        name:
          type: string
          description: The name of the document.
        subject:
          type: string
          description: Email subject for the signature request that recipients will
            see. Defaults to the default system subject or a template subject (if
            the document is created from a template).
        message:
          type: string
          description: Email message for the signature request that recipients will
            see. Defaults to the default system message or a template message (if
            the document is created from a template).
        recipients:
          "$ref": "#/components/schemas/Recipients"
        draft:
          type: boolean
